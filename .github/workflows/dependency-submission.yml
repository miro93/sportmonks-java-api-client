name: Dependency Submission

# Submits the resolved Gradle dependency graph to GitHub's Dependency Graph
# (GitHub does not natively detect Gradle dependencies). On `main` this keeps the
# baseline graph current for Dependabot alerts; on pull_request it provides the
# snapshot that the Dependency Review workflow diffs against.

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write  # required to submit the dependency graph (same-repo PRs only)

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
