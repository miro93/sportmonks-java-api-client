name: Dependency Submission

# Submits the resolved Gradle dependency graph to GitHub's Dependency Graph
# (GitHub does not natively detect Gradle dependencies). On `main` this keeps the
# baseline graph current for Dependabot alerts; on pull_request it provides the
# snapshot that the Dependency Review workflow diffs against.

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write  # required to submit the dependency graph (same-repo PRs only)

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          # Only track what the published artifacts actually ship (runtime classpaths).
          # Test-only tooling (WireMock -> Jetty, JUnit, AssertJ) is never published, so it
          # must not pollute the dependency graph nor fail Dependency Review on test-scope
          # advisories we can't act on (e.g. Jetty 11.x is EOL with no fix). This covers the
          # standard test classpaths and the GraalVM plugin's native test classpaths
          # (nativeImageTestClasspath[Internal]), which also pull the WireMock/Jetty test tree.
          dependency-graph-exclude-configurations: '.*[Tt]est.*Classpath.*'
