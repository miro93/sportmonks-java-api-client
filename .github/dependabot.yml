version: 2
updates:
  # Gradle dependencies (build scripts + version catalog libs.versions.toml)
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      gradle-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows (kept pinned to SHAs; Dependabot bumps them)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
